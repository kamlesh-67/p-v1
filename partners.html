<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partners — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>
<div class="page-shell">
  <div id="header-container"></div>
  <main class="p-6 max-w-7xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="font-display text-xl font-bold text-gray-900">Partner Management</h2>
        <p class="text-sm text-gray-400 mt-0.5">Manage and monitor your business relationships.</p>
      </div>
      <button class="btn btn-primary">Add Partner</button>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="ph-card p-6">
         <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 bg-primary-50 text-primary-700 rounded-lg flex items-center justify-center font-display font-bold text-lg">ND</div>
            <div>
               <h3 class="text-sm font-semibold">Nexus Dynamics</h3>
               <p class="text-xs text-gray-400">Tier 1 Partner</p>
            </div>
         </div>
         <div class="space-y-3 pt-4 border-t border-gray-50">
            <div class="flex items-center justify-between text-xs">
               <span class="text-gray-400">Status</span>
               <span class="badge badge-green">Active</span>
            </div>
            <div class="flex items-center justify-between text-xs">
               <span class="text-gray-400">Last Order</span>
               <span class="text-gray-900 font-medium">2 days ago</span>
            </div>
         </div>
      </div>

      <div class="ph-card p-6 border-dashed border-2 border-gray-100 shadow-none flex flex-col items-center justify-center text-center py-12">
         <div class="w-10 h-10 rounded-full bg-gray-50 text-gray-300 flex items-center justify-center mb-3">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
         </div>
         <p class="text-xs font-medium text-gray-400">Invite a neue entity to the network</p>
      </div>
    </div>
  </main>
</div>
<script src="js/app.js"></script>
<script>initPage('partners', 'Partners');</script>
</body>
</html>
