<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Address — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>

  <main class="p-6 max-w-4xl mx-auto">
    
    <!-- Breadcrumbs -->
    <nav class="flex mb-4 text-xs font-medium text-gray-400 gap-2 items-center">
      <a href="dashboard.html" class="hover:text-primary-700">Dashboard</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <a href="address-master-list.html" class="hover:text-primary-700">Address Master</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-gray-900">Add New Address</span>
    </nav>

    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="font-display text-xl font-bold text-gray-900 tracking-tight">Add Address</h2>
        <p class="text-sm text-gray-400 mt-1">Register a new store or warehouse location.</p>
      </div>
      <div class="flex gap-3">
        <a href="address-master-list.html" class="btn border-gray-200 text-gray-600 hover:bg-gray-50 text-sm py-2">Cancel</a>
        <button form="create-address-form" type="submit" class="btn btn-primary text-sm py-2 px-6">Save Address</button>
      </div>
    </div>

    <form id="create-address-form" class="space-y-6 pb-12">
      
      <!-- Store Details -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          Location Details
        </h3>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="ph-label">Store Name</label>
            <input type="text" class="ph-input" placeholder="e.g. Bangalore Distribution Center" required>
          </div>
          <div>
            <label class="ph-label">Store Code</label>
            <input type="text" class="ph-input" placeholder="e.g. WH-BLR-01" required>
          </div>
          <div class="md:col-span-2">
            <label class="ph-label">Store Address</label>
            <textarea class="ph-input" rows="3" placeholder="Full street address..."></textarea>
          </div>
          <div>
            <label class="ph-label">City</label>
            <input type="text" class="ph-input" placeholder="e.g. Bangalore">
          </div>
          <div>
            <label class="ph-label">Country</label>
            <select class="ph-input">
              <option value="">Select Country</option>
              <option value="IN">India</option>
              <option value="US">United States</option>
              <option value="UK">United Kingdom</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Region / State</label>
            <select class="ph-input">
              <option value="">Select Region</option>
              <option>Karnataka</option>
              <option>Maharashtra</option>
              <option>Tamil Nadu</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Phone No</label>
            <input type="text" class="ph-input" placeholder="+91 00000 00000">
          </div>
        </div>
      </div>

      <!-- Contact Persons -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          Contact Information
        </h3>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="ph-label">Stock Manager Name</label>
            <input type="text" class="ph-input" placeholder="Full name of manager">
          </div>
          <div>
            <label class="ph-label">Email Address</label>
            <input type="email" class="ph-input" placeholder="manager@company.com">
          </div>
          <div class="md:col-span-2">
            <label class="ph-label">Watcher Email (Optional)</label>
            <input type="text" class="ph-input" placeholder="Comma separated emails for notifications">
            <p class="text-[10px] text-gray-400 mt-1">These contacts will receive CC on all order communications.</p>
          </div>
        </div>
      </div>

    </form>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  initPage('address-master', 'Add Address');
  
  document.getElementById('create-address-form').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('Address saved successfully!');
    window.location.href = 'address-master-list.html';
  });
</script>
</body>
</html>
