<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad-hoc Returns — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>

  <main class="p-6 max-w-7xl mx-auto">
    
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="font-display text-xl font-bold text-gray-900 tracking-tight">Ad-hoc Returns</h2>
        <p class="text-sm text-gray-400 mt-1">Manage return requests for customer direct pickups.</p>
      </div>
      <a href="adhoc-return-create.html" class="btn btn-primary text-sm py-2 px-4 shadow-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Book Ad-hoc Return
      </a>
    </div>

    <!-- Table -->
    <div class="ph-card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="ph-table">
          <thead>
            <tr>
              <th>Request ID</th>
              <th>Customer Details</th>
              <th>Location</th>
              <th>Reason</th>
              <th>Return Date</th>
              <th>Status</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr class="hover:bg-gray-50/50 cursor-pointer" onclick="location.href='adhoc-return-detail.html'">
              <td><span class="font-mono text-xs font-semibold text-primary-700">ADHOC-7721</span></td>
              <td>
                <div class="flex flex-col">
                  <span class="text-sm text-gray-900">Arjun Sharma</span>
                  <span class="text-[10px] text-gray-400">arjun.sh@gmail.com</span>
                </div>
              </td>
              <td><span class="text-sm text-gray-600">Mumbai, MH</span></td>
              <td><span class="text-xs text-gray-500 italic">Damaged Item</span></td>
              <td><span class="text-xs text-gray-900 font-medium">Mar 18, 2024</span></td>
              <td><span class="badge badge-amber">Awaiting Approval</span></td>
              <td class="text-right">
                <div class="flex items-center justify-end gap-2 text-gray-400">
                  <button class="p-1 hover:text-primary-700 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
  initPage('adhoc-return', 'Ad-hoc Returns');
</script>
</body>
</html>
