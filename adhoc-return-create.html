<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad-hoc Return Booking — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>

  <main class="p-6 max-w-4xl mx-auto">
    
    <!-- Breadcrumbs -->
    <nav class="flex mb-4 text-xs font-medium text-gray-400 gap-2 items-center">
      <a href="dashboard.html" class="hover:text-primary-700">Dashboard</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <a href="adhoc-return-list.html" class="hover:text-primary-700">Ad-hoc Returns</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-gray-900">Book Ad-hoc Return</span>
    </nav>

    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="font-display text-xl font-bold text-gray-900 tracking-tight">Ad-hoc Return Booking</h2>
        <p class="text-sm text-gray-400 mt-1">Direct return pickup request for unregistered customers or special cases.</p>
      </div>
      <div class="flex gap-3">
        <a href="adhoc-return-list.html" class="btn border-gray-200 text-gray-600 hover:bg-gray-50 text-sm py-2">Cancel</a>
        <button form="book-adhoc-form" type="submit" class="btn btn-primary text-sm py-2 px-6">Book Return</button>
      </div>
    </div>

    <form id="book-adhoc-form" class="space-y-6 pb-12">
      
      <!-- Customer Information -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Customer Information
        </h3>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div>
            <label class="ph-label">Customer Name</label>
            <input type="text" class="ph-input" placeholder="Full name" required>
          </div>
          <div>
            <label class="ph-label">Phone No</label>
            <input type="text" class="ph-input" placeholder="+91 XXXX XXXX" required>
          </div>
          <div>
            <label class="ph-label">Email Address</label>
            <input type="email" class="ph-input" placeholder="customer@email.com">
          </div>
        </div>
      </div>

      <!-- Pickup Address -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Pickup Location
        </h3>
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="md:col-span-2 lg:col-span-4">
            <label class="ph-label">Full Pickup Address</label>
            <textarea class="ph-input" rows="2" placeholder="House/Office No, Street, Landmark..." required></textarea>
          </div>
          <div>
            <label class="ph-label">City</label>
            <input type="text" class="ph-input" required>
          </div>
          <div>
            <label class="ph-label">State</label>
            <select class="ph-input" required>
              <option value="">Select State</option>
              <option>Maharashtra</option>
              <option>Karnataka</option>
              <option>Delhi</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Pincode</label>
            <input type="text" class="ph-input" pattern="[0-9]{6}" required>
          </div>
        </div>
      </div>

      <!-- Return Specifications -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Return Specification
        </h3>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="ph-label">Return Reason</label>
            <select class="ph-input" required>
              <option value="">Select Reason</option>
              <option>Damaged Item</option>
              <option>Incorrect Shipment</option>
              <option>Product Dissatisfaction</option>
              <option>Warranty Claim</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Requested Pickup Date</label>
            <input type="date" class="ph-input" required>
          </div>
        </div>
      </div>

      <!-- Documents -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
          Feedback & Attachments
        </h3>
        <div class="space-y-4">
          <div>
            <label class="ph-label">Internal Feedback</label>
            <textarea class="ph-input" rows="3" placeholder="Notes for fulfillment team..."></textarea>
          </div>
          <div>
            <label class="ph-label">Attach Reference Photos</label>
            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-dashed border-gray-200 rounded-lg hover:border-primary-300 cursor-pointer">
              <div class="text-center">
                 <svg class="mx-auto h-8 w-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 48 48">
                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                 </svg>
                 <p class="mt-1 text-xs text-gray-500">Upload item images or waybill</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </form>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  initPage('adhoc-return', 'Ad-hoc Returns');
</script>
</body>
</html>
