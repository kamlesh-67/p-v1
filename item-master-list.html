<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Master — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>

  <main class="p-6 max-w-7xl mx-auto">
    
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="font-display text-xl font-bold text-slate-900 tracking-tight">Item Master</h2>
        <p class="text-sm font-medium text-slate-500 mt-1">Manage and view all product master records.</p>
      </div>
      <a href="item-master-create.html" class="btn btn-primary text-sm py-2 px-4 shadow-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add New Item
      </a>
    </div>

    <!-- Filters -->
    <div class="ph-card p-4 mb-6 grid md:grid-cols-4 gap-4 items-end">
      <div class="md:col-span-2">
        <label class="ph-label text-[10px] text-slate-500 uppercase tracking-widest font-black">Search</label>
        <div class="relative">
          <input type="text" class="ph-input pl-9 ring-1 ring-slate-200 focus:ring-primary-500" placeholder="Search by SKU, Barcode, or Name...">
          <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
      </div>
      <div>
        <label class="ph-label text-[10px]">Category</label>
        <select class="ph-input">
          <option>All Categories</option>
          <option>Electronics</option>
          <option>Apparel</option>
          <option>Homeware</option>
        </select>
      </div>
      <button class="btn border-gray-200 text-gray-600 hover:bg-gray-50 text-sm py-2">Apply Filters</button>
    </div>

    <!-- Table -->
    <div class="ph-card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="ph-table">
          <thead>
            <tr>
              <th class="w-12">Image</th>
              <th>SKU</th>
              <th>Display Name</th>
              <th>Category</th>
              <th>Barcode</th>
              <th class="text-center">Quantity</th>
              <th>Status</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="item-table-body">
            <!-- Sample Data -->
            <tr class="hover:bg-gray-50/50 cursor-pointer" onclick="location.href='item-master-detail.html'">
              <td>
                <div class="w-10 h-10 rounded border border-gray-100 overflow-hidden relative">
                  <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&q=80" class="w-full h-full object-cover">
                  <div class="absolute bottom-0 right-0 bg-black/60 text-[8px] text-white px-1 font-bold">4</div>
                </div>
              </td>
              <td><span class="font-mono text-xs font-semibold text-primary-700">SKU-PRM-001</span></td>
              <td><span class="text-sm font-medium text-gray-900">Premium Watch Series X</span></td>
              <td><span class="text-xs text-gray-500">Electronics</span></td>
              <td><span class="font-mono text-[10px] text-gray-400">123456789012</span></td>
              <td class="text-center"><span class="text-sm font-bold text-gray-900">1,240</span></td>
              <td><span class="badge badge-green">In-Stock</span></td>
              <td class="text-right">
                <div class="flex items-center justify-end gap-2">
                  <button class="p-1.5 text-gray-400 hover:text-primary-700 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                  <button class="p-1.5 text-gray-400 hover:text-red-600 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>
              </td>
            </tr>
            <!-- More rows... -->
          </tbody>
        </table>
      </div>
      
      <!-- Pagination -->
      <div class="px-5 py-3 border-t border-slate-100 flex items-center justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest bg-slate-50/50">
        <span>Showing 1 to 10 of 42 items</span>
        <div class="flex gap-1">
          <button class="p-1 px-2 border rounded hover:bg-gray-50">Prev</button>
          <button class="p-1 px-2 border bg-primary-50 text-primary-700 border-primary-100 rounded">1</button>
          <button class="p-1 px-2 border rounded hover:bg-gray-50">2</button>
          <button class="p-1 px-2 border rounded hover:bg-gray-50">Next</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="js/app.js"></script>
<script>
  initPage('item-master', 'Item Master');
</script>
</body>
</html>
