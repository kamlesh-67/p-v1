<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create User — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>

  <main class="p-6 max-w-4xl mx-auto">
    
    <!-- Breadcrumbs -->
    <nav class="flex mb-4 text-xs font-medium text-gray-400 gap-2 items-center">
      <a href="dashboard.html" class="hover:text-primary-700">Dashboard</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <a href="user-master-list.html" class="hover:text-primary-700">User Master</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-gray-900">Create New User</span>
    </nav>

    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="font-display text-xl font-bold text-gray-900 tracking-tight">Create User</h2>
        <p class="text-sm text-gray-400 mt-1">Register a new team member with specific roles and categories.</p>
      </div>
      <div class="flex gap-3">
        <a href="user-master-list.html" class="btn border-gray-200 text-gray-600 hover:bg-gray-50 text-sm py-2">Cancel</a>
        <button form="create-user-form" type="submit" class="btn btn-primary text-sm py-2 px-6">Create User</button>
      </div>
    </div>

    <form id="create-user-form" class="space-y-6 pb-12">
      
      <!-- Personal Details -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Personal Information
        </h3>
        <div class="grid md:grid-cols-3 gap-6">
          <div>
            <label class="ph-label">First Name</label>
            <input type="text" class="ph-input" placeholder="e.g. John" required>
          </div>
          <div>
            <label class="ph-label">Middle Name</label>
            <input type="text" class="ph-input" placeholder="Optional">
          </div>
          <div>
            <label class="ph-label">Last Name</label>
            <input type="text" class="ph-input" placeholder="e.g. Doe" required>
          </div>
          <div class="md:col-span-2">
            <label class="ph-label">Email Address</label>
            <input type="email" class="ph-input" placeholder="john.doe@partnerhub.com" required>
          </div>
          <div>
            <label class="ph-label">Screen Name</label>
            <input type="text" class="ph-input" placeholder="e.g. jdoe123">
          </div>
        </div>
      </div>

      <!-- Access & Roles -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2" >
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          Account & Security
        </h3>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="ph-label">Roles</label>
            <select class="ph-input">
              <option value="">Select Role</option>
              <option value="admin">Administrator</option>
              <option value="manager">Warehouse Manager</option>
              <option value="operator">Inbound Operator</option>
              <option value="viewer">Viewer</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Category</label>
            <input type="text" class="ph-input" placeholder="e.g. Logistics, Finance">
          </div>
          <div>
            <label class="ph-label">Password</label>
            <input type="password" class="ph-input" placeholder="••••••••" required>
          </div>
          <div>
            <label class="ph-label">Confirm Password</label>
            <input type="password" class="ph-input" placeholder="••••••••" required>
          </div>
        </div>
      </div>

    </form>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  initPage('user-master', 'Create User');
  
  document.getElementById('create-user-form').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('User created successfully!');
    window.location.href = 'user-master-list.html';
  });
</script>
</body>
</html>
