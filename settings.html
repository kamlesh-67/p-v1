<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>
<div class="page-shell">
  <div id="header-container"></div>
  <main class="p-6 max-w-7xl mx-auto">
    <div class="mb-6">
      <h2 class="font-display text-xl font-bold text-gray-900">Account Settings</h2>
      <p class="text-sm text-gray-400 mt-0.5">Control your profile and security preferences.</p>
    </div>

    <div class="grid lg:grid-cols-4 gap-8">
       <div class="lg:col-span-1">
          <nav class="space-y-1">
             <button class="w-full text-left px-4 py-2 bg-primary-50 text-primary-700 rounded text-sm font-medium">Profile Info</button>
             <button class="w-full text-left px-4 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm transition-colors">Security</button>
             <button class="w-full text-left px-4 py-2 text-gray-600 hover:bg-gray-50 rounded text-sm transition-colors">Integrations</button>
          </nav>
       </div>
       <div class="lg:col-span-3 ph-card p-6">
          <h3 class="text-sm font-semibold mb-6">Profile Information</h3>
          <form class="space-y-6">
             <div class="grid md:grid-cols-2 gap-6">
                <div>
                   <label class="ph-label">Full Name</label>
                   <input type="text" class="ph-input" value="Demo User">
                </div>
                <div>
                   <label class="ph-label">Email Address</label>
                   <input type="email" class="ph-input" value="user@partnerhub.com">
                </div>
             </div>
             <div>
                <label class="ph-label">Company Name</label>
                <input type="text" class="ph-input" value="PartnerHub Inc.">
             </div>
             <div class="pt-4 flex justify-end gap-3">
                <button type="button" class="btn btn-outline">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
             </div>
          </form>
       </div>
    </div>
  </main>
</div>
<script src="js/app.js"></script>
<script>initPage('settings', 'Settings');</script>
</body>
</html>
