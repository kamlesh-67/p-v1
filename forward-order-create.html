<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forward Order Booking — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>

  <main class="p-6 max-w-4xl mx-auto">
    
    <!-- Breadcrumbs -->
    <nav class="flex mb-4 text-xs font-medium text-gray-400 gap-2 items-center">
      <a href="dashboard.html" class="hover:text-primary-700">Dashboard</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <a href="forward-order-list.html" class="hover:text-primary-700">Forward Orders</a>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="text-gray-900">Book Forward Order</span>
    </nav>

    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="font-display text-xl font-bold text-gray-900 tracking-tight">Forward Order Booking</h2>
        <p class="text-sm text-gray-400 mt-1">Schedule new outbound shipments and deliveries.</p>
      </div>
      <div class="flex gap-3">
        <a href="forward-order-list.html" class="btn border-gray-200 text-gray-600 hover:bg-gray-50 text-sm py-2">Cancel</a>
        <button form="book-forward-form" type="submit" class="btn btn-primary text-sm py-2 px-6">Book Order</button>
      </div>
    </div>

    <form id="book-forward-form" class="space-y-6 pb-12">
      
      <!-- Customer Contact -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Delivery Contact Information
        </h3>
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="ph-label">Contact Person Name</label>
            <input type="text" class="ph-input" placeholder="Full name of recipient" required>
          </div>
          <div>
            <label class="ph-label">Contact Person Phone No</label>
            <input type="text" class="ph-input" placeholder="+91 XXXX XXXX" required>
          </div>
          <div class="md:col-span-2">
            <label class="ph-label">Watchers Email</label>
            <input type="text" class="ph-input" placeholder="Comma separated emails">
          </div>
        </div>
      </div>

      <!-- Order Classification -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          Order Specification
        </h3>
        <div class="grid md:grid-cols-3 gap-6">
          <div>
            <label class="ph-label">Order Type</label>
            <select class="ph-input">
              <option value="">Select Type</option>
              <option value="standard">Standard Delivery</option>
              <option value="express">Express Delivery</option>
              <option value="scheduled">Scheduled Bulk</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Order Priority</label>
            <select class="ph-input">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div>
            <label class="ph-label">Order Reason</label>
            <select class="ph-input">
              <option value="">Select Reason</option>
              <option value="new_sale">New Sale</option>
              <option value="replacement">Replacement</option>
              <option value="gift">Corporate Gift</option>
              <option value="internal">Internal Transfer</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Scheduling -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Shipping Timeline
        </h3>
        <div class="grid md:grid-cols-3 gap-6">
          <div>
            <label class="ph-label">Pickup Date & Time</label>
            <input type="datetime-local" class="ph-input" required>
          </div>
          <div>
            <label class="ph-label">Dispatch Date & Time</label>
            <input type="datetime-local" class="ph-input">
          </div>
          <div>
            <label class="ph-label">Expected Delivery Date</label>
            <input type="datetime-local" class="ph-input">
          </div>
        </div>
      </div>

      <!-- Feedback & Attachments -->
      <div class="ph-card p-6">
        <h3 class="text-sm font-semibold text-gray-900 mb-5 pb-4 border-b border-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
          Feedback & Attachments
        </h3>
        <div class="space-y-4">
          <div>
            <label class="ph-label">Feedback / Instructions</label>
            <textarea class="ph-input" rows="3" placeholder="Special delivery instructions..."></textarea>
          </div>
          <div>
            <label class="ph-label">Order Documentation (PO, Invoice)</label>
            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-200 border-dashed rounded-md hover:border-primary-300 transition-colors cursor-pointer">
              <div class="space-y-1 text-center">
                <svg class="mx-auto h-8 w-8 text-gray-300" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                   <path d="M24 14v10m0 0v10m0-10h10m-10 0H14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <div class="flex text-xs text-gray-600">
                   <span class="font-medium text-primary-700">Upload documentation</span>
                   <p class="pl-1">or drag and drop</p>
                </div>
                <p class="text-[10px] text-gray-400">PDF up to 10MB</p>
              </div>
            </div>
          </div>
        </div>
      </div>

    </form>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  initPage('forward-order', 'Forward Order Booking');
</script>
</body>
</html>
