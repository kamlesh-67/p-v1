<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartnerHub — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#faf5ff', 100: '#f3e8ff', 200: '#e9d5ff',
              300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7',
              600: '#9d4edd', 700: '#7b2cbf', 800: '#5a189a', 900: '#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans', 'sans-serif'], display: ['Syne', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="login-bg">

  <div class="w-full max-w-sm mx-auto px-4">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8 animate-fadeup animate-fadeup-1">
      <div class="w-10 h-10 bg-primary-700 rounded flex items-center justify-center mb-3">
        <span class="text-white font-bold text-sm tracking-wide">PH</span>
      </div>
      <h1 class="font-display text-2xl font-black text-slate-900 tracking-tight">PartnerHub</h1>
      <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Enterprise Commerce Platform</p>
    </div>

    <!-- Card -->
    <div class="ph-card p-8 animate-fadeup animate-fadeup-2">
      <h2 class="font-display text-xl font-bold text-slate-900 mb-1">Welcome back</h2>
      <p class="text-sm font-medium text-slate-600 mb-6">Sign in to your partner account</p>

      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="space-y-4">

          <!-- Email -->
          <div>
            <label class="ph-label" for="email">Business Email</label>
            <input
              id="email"
              type="email"
              class="ph-input"
              placeholder="you@company.com"
              value="demo@partnerhub.com"
              required>
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="ph-label" for="password" style="margin-bottom:0">Password</label>
              <a href="#" class="text-xs text-primary-700 hover:underline">Forgot password?</a>
            </div>
            <div class="relative">
              <input
                id="password"
                type="password"
                class="ph-input pr-10"
                placeholder="••••••••"
                value="demo1234"
                required>
              <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember -->
          <div class="flex items-center gap-2">
            <input id="remember" type="checkbox" class="w-4 h-4 rounded border-gray-300 accent-primary-700" checked>
            <label for="remember" class="text-sm text-gray-500">Keep me signed in</label>
          </div>

          <!-- Error message -->
          <div id="login-error" class="hidden rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600"></div>

          <!-- Submit -->
          <button type="submit" id="login-btn" class="btn btn-primary w-full justify-center py-2.5 text-sm">
            <span id="btn-text">Sign in</span>
            <svg id="btn-spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </button>

        </div>
      </form>

      <!-- Demo hint -->
      <div class="mt-5 pt-5 border-t border-gray-100">
        <p class="text-xs font-medium text-slate-500 text-center">Demo credentials pre-filled — just click Sign in</p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs font-bold text-slate-400 uppercase tracking-widest mt-8">
      &copy; 2024 PartnerHub Global.
    </p>

  </div>

  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('ph_auth')) {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const error = document.getElementById('login-error');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');

      if (!email || !password) {
        error.textContent = 'Please fill in all fields.';
        error.classList.remove('hidden');
        return;
      }

      error.classList.add('hidden');
      btnText.textContent = 'Signing in…';
      spinner.classList.remove('hidden');

      setTimeout(() => {
        localStorage.setItem('ph_auth', 'true');
        localStorage.setItem('ph_user', JSON.stringify({
          name: 'Demo User',
          company: 'PartnerHub Inc.',
          email: email
        }));
        window.location.href = 'dashboard.html';
      }, 900);
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
