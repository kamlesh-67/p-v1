<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — PartnerHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',
              400:'#c084fc',500:'#a855f7',600:'#9d4edd',700:'#7b2cbf',
              800:'#5a189a',900:'#3c096c',
            }
          },
          fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Syne','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div id="sidebar-container"></div>
<div id="cart-drawer-container"></div>

<div class="page-shell">
  <div id="header-container"></div>
  <main class="p-6 max-w-7xl mx-auto">
    <div class="mb-6">
      <h2 class="font-display text-xl font-bold text-gray-900">Analytics Insights</h2>
      <p class="text-sm text-gray-400 mt-0.5">Performance metrics across your partner network.</p>
    </div>

    <div class="grid lg:grid-cols-3 gap-6 mb-8">
      <div class="lg:col-span-2 ph-card p-6">
         <h3 class="text-sm font-semibold mb-6">Revenue Growth</h3>
         <div class="chart-box">
            <div class="chart-bar h-[40%] bg-primary-200"></div>
            <div class="chart-bar h-[60%] bg-primary-300"></div>
            <div class="chart-bar h-[50%] bg-primary-400"></div>
            <div class="chart-bar h-[85%] bg-primary-600"></div>
            <div class="chart-bar h-[70%] bg-primary-700"></div>
         </div>
      </div>
      <div class="ph-card p-6">
         <h3 class="text-sm font-semibold mb-4">Distribution</h3>
         <div class="space-y-4 pt-4">
            <div class="flex items-center justify-between">
               <span class="text-xs text-gray-500">Global Partners</span>
               <span class="text-xs font-bold text-gray-900">42%</span>
            </div>
            <div class="w-full bg-gray-50 h-1.5 rounded-full overflow-hidden">
               <div class="bg-primary-600 h-full w-[42%]"></div>
            </div>
            <div class="flex items-center justify-between">
               <span class="text-xs text-gray-500">Local Distribution</span>
               <span class="text-xs font-bold text-gray-900">58%</span>
            </div>
            <div class="w-full bg-gray-50 h-1.5 rounded-full overflow-hidden">
               <div class="bg-amber-400 h-full w-[58%]"></div>
            </div>
         </div>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>initPage('analytics', 'Analytics');</script>
</body>
</html>
